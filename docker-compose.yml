services:
  opus:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      # SQLite database persists across container restarts
      - opus-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  opus-data:
